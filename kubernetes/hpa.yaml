apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: max-weather
  namespace: max-weather
  labels:
    app.kubernetes.io/name: max-weather
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: max-weather
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60

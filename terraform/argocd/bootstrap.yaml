# Argo CD Application manifests — applied by the argocd terraform stage.
# GITHUB_REPO_URL is replaced by terraform at apply time (var.github_repo_url).
#
# Edit this file when adding/removing applications managed by Argo CD; the
# stage's `null_resource.argocd_bootstrap` re-applies on any change to the
# file's hash.
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metrics-server
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.io
spec:
  project: default
  source:
    repoURL: GITHUB_REPO_URL
    targetRevision: main
    path: gitops/argocd/infra/metrics-server
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---

replicaCount: 1

image:
  repository: 047750375423.dkr.ecr.ap-south-1.amazonaws.com/max-weather
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: true
  className: nginx
  host: max-weather.workaholic.dpdns.org
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/limit-connections: "20"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type"
  paths:
    - path: /token
      pathType: Prefix
    - path: /weather
      pathType: Prefix
    - path: /health
      pathType: Exact
    - path: /docs
      pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

pdb:
  enabled: false
  minAvailable: 1

serviceAccount:
  name: max-weather-sa

secretName: max-weather-secrets

# Scheduled scaling — CronJobs that bump the HPA's minReplicas up before
# predicted peaks and back down overnight. The HPA still does reactive
# (CPU/memory-driven) scaling between schedules; this just lifts the floor.
scheduledScaling:
  enabled: false
  image: bitnami/kubectl:1.32
  serviceAccount:
    name: max-weather-scaler
  schedules: []
  # Example (set per-environment in values-prod.yaml):
  # - name: morning-up
  #   cron: "0 6 * * *"
  #   timeZone: Asia/Kolkata
  #   minReplicas: 5

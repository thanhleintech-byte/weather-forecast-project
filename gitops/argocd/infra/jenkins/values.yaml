jenkins:
  controller:
    image:
      tag: "2.504.1-lts"
    serviceType: ClusterIP
    admin:
      # Use the secret created by the argocd terraform stage. The Jenkins
      # helm chart reads jenkins-admin-user / jenkins-admin-password from it.
      existingSecret: jenkins-admin-secret
      userKey: jenkins-admin-user
      passwordKey: jenkins-admin-password
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 1500m
        memory: 2Gi
    installPlugins:
      - kubernetes:latest
      - workflow-aggregator:latest
      - git:latest
      - configuration-as-code:latest
      - job-dsl:latest
      - github:latest
      - github-branch-source:latest
      - pipeline-aws:latest
      - docker-workflow:latest
      - plain-credentials:latest
      - aws-credentials:latest
      - junit:latest
      - ws-cleanup:latest
    jenkinsUrl: "https://jenkins.workaholic.dpdns.org"
    ingress:
      enabled: true
      ingressClassName: nginx
      hostName: jenkins.workaholic.dpdns.org
      annotations:
        nginx.ingress.kubernetes.io/proxy-body-size: "0"
        nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    envFrom:
      - secretRef:
          name: jenkins-credentials
    sidecars:
      configAutoReload:
        enabled: true
    JCasC:
      defaultConfig: true
      configScripts:
        credentials: |
          credentials:
            system:
              domainCredentials:
                - credentials:
                    - usernamePassword:
                        scope: GLOBAL
                        id: "github-pat"
                        description: "GitHub PAT — weather-forecast-project"
                        username: "${GITHUB_USERNAME}"
                        password: "${GITHUB_PAT}"
                    # AWS access for ECR push + EKS deploy is provided by
                    # IRSA on the jenkins ServiceAccount — no static keys.
                    - string:
                        scope: GLOBAL
                        id: "aws-region"
                        description: "AWS region"
                        secret: "ap-south-1"
                    - string:
                        scope: GLOBAL
                        id: "ecr-registry-url"
                        description: "ECR registry base URL"
                        secret: "047750375423.dkr.ecr.ap-south-1.amazonaws.com"
  agent:
    enabled: true
    namespace: jenkins
  persistence:
    enabled: true
    storageClass: gp2
    size: 8Gi
  serviceAccount:
    create: true
    name: jenkins
    annotations:
      eks.amazonaws.com/role-arn: "arn:aws:iam::047750375423:role/max-weather-production-jenkins-role"
  rbac:
    create: true
    readSecrets: true

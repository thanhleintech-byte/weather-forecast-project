jenkins:
  controller:
    image:
      tag: "2.504.1-lts"
    serviceType: ClusterIP
    admin:
      username: admin
      password: changeme123!
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 1500m
        memory: 2Gi
    installPlugins:
      - kubernetes:latest
      - workflow-aggregator:latest
      - git:latest
      - configuration-as-code:latest
      - job-dsl:latest
      - github:latest
      - github-branch-source:latest
      - pipeline-aws:latest
      - docker-workflow:latest
      - plain-credentials:latest
      - aws-credentials:latest
    envFrom:
      - secretRef:
          name: jenkins-credentials
    sidecars:
      configAutoReload:
        enabled: true
    JCasC:
      defaultConfig: true
      configScripts:
        credentials: |
          credentials:
            system:
              domainCredentials:
                - credentials:
                    - usernamePassword:
                        scope: GLOBAL
                        id: "github-pat"
                        description: "GitHub PAT — weather-forecast-project"
                        username: "thanhleintech-byte"
                        password: "${GITHUB_PAT}"
                    - usernamePassword:
                        scope: GLOBAL
                        id: "aws-credentials"
                        description: "AWS credentials — ECR push + EKS deploy"
                        username: "${AWS_ACCESS_KEY_ID}"
                        password: "${AWS_SECRET_ACCESS_KEY}"
                    - string:
                        scope: GLOBAL
                        id: "aws-region"
                        description: "AWS region"
                        secret: "ap-south-1"
  agent:
    enabled: true
    namespace: jenkins
  persistence:
    enabled: true
    storageClass: gp2
    size: 8Gi
  serviceAccount:
    create: true
    name: jenkins
  rbac:
    create: true
    readSecrets: true

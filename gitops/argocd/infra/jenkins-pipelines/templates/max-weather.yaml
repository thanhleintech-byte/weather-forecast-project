apiVersion: v1
kind: ConfigMap
metadata:
  name: jenkins-casc-max-weather-pipeline
  namespace: {{ .Release.Namespace }}
  labels:
    jenkins-jenkins-config: "true"
data:
  max-weather-pipeline.yaml: |
    jobs:
      - script: |
          multibranchPipelineJob('{{ .Values.pipeline.name }}') {
            description('Max Weather CI/CD — sourced from GitHub')
            branchSources {
              github {
                id('max-weather-src')
                repoOwner('{{ .Values.pipeline.repoOwner }}')
                repository('{{ .Values.pipeline.repository }}')
                scanCredentialsId('{{ .Values.pipeline.credentialsId }}')
              }
            }
            factory {
              workflowBranchProjectFactory {
                scriptPath('{{ .Values.pipeline.jenkinsfilePath }}')
              }
            }
            orphanedItemStrategy {
              discardOldItems {
                daysToKeep({{ .Values.pipeline.daysToKeep }})
                numToKeep({{ .Values.pipeline.numToKeep }})
              }
            }
            triggers {
              periodicFolderTrigger { interval('{{ .Values.pipeline.scanInterval }}') }
            }
          }
